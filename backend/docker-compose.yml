version: '3.8'

services:
  db:
    image: postgres:15
    container_name: noexcuses_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: noexcuses_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_noexcuses_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: noexcuses_app
    restart: always
    ports:
      - "8083:8080"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password123
    depends_on:
      - db

volumes:
  postgres_noexcuses_data:
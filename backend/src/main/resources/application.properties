# ===============================
# CONFIGURACION DE BASE DE DATOS (PostgreSQL Dockerizada)
# ===============================
spring.application.name=noexcuses

# Usamos las variables de entorno inyectadas por Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/noexcuses_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true